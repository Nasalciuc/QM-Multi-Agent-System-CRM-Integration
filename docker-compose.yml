# docker-compose.yml — QM Multi Agent System
# Usage:
#   docker compose up          (run pipeline)
#   docker compose run qm-system --folder data/audio
#   docker compose run qm-tests

services:
  qm-system:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: ["--folder", "data/audio"]
    # MED-6: Docker health check
    healthcheck:
      test: ["CMD", "python", "-c", "import src; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  qm-tests:
    build: .
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--tb=short"]
    volumes:
      - ./tests:/app/tests
      - ./config:/app/config
      - ./src:/app/src
