# docker-compose.yml — QM Multi Agent System
# Usage:
#   docker compose up          (run pipeline)
#   docker compose run qm-system --folder data/audio
#   docker compose run qm-tests

services:
  qm-system:
    build:
      context: .
      target: production
    env_file: .env
    volumes:
      - ./data:/app/data
    command: ["--folder", "data/audio"]
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
    # Healthcheck: verify Python can import AND data dirs are writable
    healthcheck:
      test: ["CMD", "python", "-c", "from core.base_llm import BaseLLM; from pathlib import Path; assert Path('data/evaluations').is_dir(); print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qm-tests:
    build:
      context: .
      target: test
    volumes:
      - ./tests:/app/tests
      - ./config:/app/config
      - ./src:/app/src
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
