# =============================================================================
# LLM Model Configuration — Single Source of Truth
# =============================================================================
# MIGRATED: OpenRouter → Mistral EU (Paris) on 2026-03-03
# Reason: OpenRouter 402 failures + GDPR compliance (EU data residency)
# Decision: Expert debate consensus — Mistral OpenAI-compatible endpoint
# =============================================================================

# Primary model — Mistral Large (Paris, EU)
primary:
  provider: "mistral-eu"
  model: "mistral-large-latest"
  base_url: "https://api.mistral.ai/v1"
  api_key_env: "MISTRAL_API_KEY"
  temperature: 0.1
  max_tokens: 4096
  pricing:
    input_per_1m: 2.00
    output_per_1m: 6.00

# Fallback chain — tried in order if primary fails
fallbacks:
  - provider: "openai-direct"
    model: "gpt-4o-2024-11-20"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.1
    max_tokens: 4096
    pricing:
      input_per_1m: 2.50
      output_per_1m: 10.00

# Token limits for preprocessing layer
token_limits:
  max_input_tokens: 30000
  max_output_tokens: 4096
  cost_warning_threshold_usd: 0.50
