# =============================================================================
# Logging Configuration — loaded via logging.config.dictConfig()
# =============================================================================
# Three formatters: console (human), file (text), json (structured)
# Three handlers: console (always) + file (rotated daily) + json_file (structured)
# Per-module log levels for fine-grained control
#
# To use JSON logging in production, set QA_LOG_FORMAT=json env var
# and update root/logger handlers to include json_file

version: 1
disable_existing_loggers: false

formatters:
  console:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%H:%M:%S"
  file:
    format: "%(asctime)s [%(levelname)s] %(name)s [%(filename)s:%(lineno)d] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    class: utils.JsonLogFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout

  file:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: file
    filename: data/qa_system.log
    when: midnight
    interval: 1
    backupCount: 14
    encoding: utf-8

  json_file:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: json
    filename: data/qa_system.json.log
    when: midnight
    interval: 1
    backupCount: 14
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  qa_system:
    level: INFO
    handlers: [console, file]
    propagate: false

  qa_system.core:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  qa_system.processing:
    level: INFO
    handlers: [console, file]
    propagate: false

  qa_system.inference:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  qa_system.agents:
    level: INFO
    handlers: [console, file]
    propagate: false

  # MED-15: Ensure STT cache and config loggers are included
  qa_system.stt_cache:
    level: INFO
    handlers: [console, file]
    propagate: false

  qa_system.config:
    level: INFO
    handlers: [console, file]
    propagate: false

  qa_system.pipeline:
    level: INFO
    handlers: [console, file]
    propagate: false
