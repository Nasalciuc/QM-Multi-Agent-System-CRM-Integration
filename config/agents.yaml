# =============================================================================
# Agent Configuration - All 4 agents in one file
# =============================================================================

# CRM API settings (audio source)
crm:
  base_url: "https://crm.buybusinessclass.com/ai"
  download_folder: "data/audio"
  delay_seconds: 1.5
  default_limit: 200

elevenlabs:
  model: "scribe_v2"           # ElevenLabs Scribe v2 (with diarization)
  credits_per_minute: 280      # ~280 credits/min on ElevenLabs
  cost_per_minute: 0.005       # $0.005/min
  output_folder: "data/transcripts"
  persist_transcripts: true    # Save transcripts to disk after transcription
  diarize: true                # Enable speaker diarization
  num_speakers: null            # null = auto-detect speaker count
  diarization_threshold: null   # null = use ElevenLabs default
  tag_audio_events: false       # Tag non-speech events (laughter, music)
  language_code: null            # null = auto-detect language
  keyterms: []                  # Domain-specific terms to boost recognition
  delay_between_calls: 0.5     # Seconds between consecutive STT API calls (#6)

# #10: LLM model config is in config/models.yaml — not duplicated here

integration:
  webhook_url: ""              # Set via WEBHOOK_URL env var
  retry_attempts: 3
  output_folder: "data/evaluations"

pipeline:
  max_consecutive_failures: 3  # Circuit breaker: stop after N consecutive LLM failures

audio_extensions:
  - ".mp3"
  - ".wav"
  - ".m4a"
