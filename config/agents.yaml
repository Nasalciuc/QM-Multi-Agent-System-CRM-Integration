# =============================================================================
# Agent Configuration - All 4 agents in one file
# =============================================================================

ringcentral:
  download_folder: "data/audio"
  delay_seconds: 1.5           # Rate limit between API calls
  days_back: 7                 # Default: process last 7 days
  per_page: 100                # Results per API page (max 250)
  call_type: "Voice"
  with_recording: true

elevenlabs:
  model: "scribe_v1"           # ElevenLabs Scribe v1
  credits_per_minute: 280      # ~280 credits/min on ElevenLabs
  cost_per_minute: 0.005       # $0.005/min
  output_folder: "data/transcripts"
  persist_transcripts: true    # Save transcripts to disk after transcription

openrouter:
  model: "gpt-4o-2024-11-20"  # Primary model (via OpenRouter)
  # Alternative models:
  # - "anthropic/claude-sonnet-4-20250514"
  # - "google/gemini-2.0-flash-001"
  temperature: 0.1             # Low for consistent scoring
  max_tokens: 4096
  pricing:
    input_per_1m: 2.50
    output_per_1m: 10.00

integration:
  webhook_url: ""              # Set via WEBHOOK_URL env var
  retry_attempts: 3
  output_folder: "data/evaluations"

pipeline:
  max_consecutive_failures: 3  # Circuit breaker: stop after N consecutive LLM failures

audio_extensions:
  - ".mp3"
  - ".wav"
  - ".m4a"
